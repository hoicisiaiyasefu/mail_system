server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mail_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update #开发阶段可以使用update方便本地测试 后续上线记得改回validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

# JWT 配置
jwt:
  secret: ${JWT_SECRET:mail-system-jwt-secret-key-2026-super-secure-!!}

# Python 智能插件配置
plugin:
  python-path: python3
  plugins-dir: python_plugins
  config-file: python_plugins/plugins_config.json   # 插件 JSON 配置文件路径

# 大模型（LLM）配置 - 可选，不填则自动降级为纯规则模式
llm:
  enabled: true               # 是否启用大模型（需自行填写 api_key）
  api-key: "sk-0a395697cc454534b81261a3e9df4a96"                  # DeepSeek API Key（从 platform.deepseek.com 获取）
  provider: openai             # DeepSeek 兼容 OpenAI 协议
  model: deepseek-v4-pro         # DeepSeek 官方模型：deepseek-chat / deepseek-reasoner
  base-url: "https://api.deepseek.com"                 # DeepSeek 官方 API 地址

# 各插件专属配置（也可写在 plugins_config.json 中）
plugins:
  email_priority_plugin:
    enabled: true
  security_ai_plugin:
    enabled: true
  spam_ml_plugin:
    enabled: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    com.example.backend.plugin: DEBUG