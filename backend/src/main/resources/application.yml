server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mail_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update #开发阶段可以使用update方便本地测试 后续上线记得改回validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

# Python 智能插件配置
plugin:
  python-path: python3
  plugins-dir: python_plugins
  config-file: python_plugins/plugins_config.json   # 插件 JSON 配置文件路径

# 大模型（LLM）配置 - 可选，不填则自动降级为纯规则模式
llm:
  enabled: true               # 是否启用大模型（需自行填写 api_key）
  api-key: "sk-9YJuAZV8YA4ZjfKKqnggtNRxUTvT6bXEQrYWKT188TyVnTN8"                  # OpenAI / 兼容 API 的密钥
  provider: openai             # openai | custom
  model: deepseek-v4-pro
  base-url: "https://www.micuapi.ai/v1"                 # 自定义 API 地址（vLLM/Ollama 等），留空用默认

# 各插件专属配置（也可写在 plugins_config.json 中）
plugins:
  email_priority_plugin:
    enabled: true
  security_ai_plugin:
    enabled: true
  spam_ml_plugin:
    enabled: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    com.example.backend.plugin: DEBUG